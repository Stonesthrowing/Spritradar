name: Spritradar Daily

# Hinweis: Geplante Workflows (schedule) laufen nur auf dem Default-Branch.
# Damit die 7:30-Nachricht automatisch kommt, muss dieser Workflow auf dem
# Default-Branch (main) liegen. Zum Testen: unten "Run workflow" (workflow_dispatch).

on:
  schedule:
    - cron: "30 5 * * *"   # 07:30 Europe/Berlin in der Sommerzeit (CEST = UTC+2)
    - cron: "30 6 * * *"   # 07:30 Europe/Berlin in der Winterzeit  (CET  = UTC+1)
  workflow_dispatch:
    inputs:
      force:
        description: "Sofort senden (Zeitfenster & Tages-Dedup ignorieren)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: spritradar-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Spritradar ausführen
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '' }}
        run: python -m spritradar.main

      - name: Aktualisierte Preishistorie committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if git diff --cached --quiet; then
            echo "Keine Änderung an der Historie."
          else
            git commit -m "chore: Preishistorie aktualisieren ($(date -u +%F))"
            git push
          fi
