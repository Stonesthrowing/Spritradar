name: Spritradar Collect

# Stündliche Preis-Momentaufnahme -> echte Tagesverläufe (data/intraday.json).
# Läuft nur auf dem Default-Branch (wie alle geplanten Workflows).

on:
  schedule:
    - cron: "5 * * * *"   # stündlich zur Minute 5
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spritradar-collect
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Preise sammeln
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m spritradar.collect
      - name: Intraday-Daten committen
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/intraday.json
          if git diff --cached --quiet; then
            echo "Keine Änderung."
          else
            git commit -m "chore: Intraday-Snapshot $(date -u +%FT%H:%MZ)"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "$BRANCH" && git push && break || sleep 3
            done
          fi
